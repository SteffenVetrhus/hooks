# docker-compose.yml – Coolify-compatible deployment
#
# Coolify can deploy this stack directly from the repo root.
# Both services expose their own ports; Coolify assigns public domains
# via its built-in proxy.
#
# Environment variables you may want to override in Coolify:
#   POCKETBASE_URL            – PocketBase instance URL
#   POCKETBASE_ADMIN_EMAIL    – PocketBase admin email
#   POCKETBASE_ADMIN_PASSWORD – PocketBase admin password
#   VITE_API_URL              – Full URL of the backend (used at frontend build time)

services:
  # ---- FastAPI backend ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - POCKETBASE_URL=${POCKETBASE_URL:-http://127.0.0.1:8090}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:-}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- React frontend (nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Point the React app at the backend. In Coolify you would set this to
        # the public URL of the api service, e.g. https://api.example.com
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    expose:
      - "80"
    depends_on:
      - api
